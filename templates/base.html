<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fault Registration System - نظام تسجيل الأعطال{% endblock %}</title>

    <!-- Bootstrap 5 RTL - للتجاوب مع الأجهزة ودعم العربية -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome - الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- ملف التنسيق الخاص بنا -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <!-- ====== شريط التنقل العلوي ====== -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <!-- اسم التطبيق -->
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-tools me-2"></i>
                Fault Registration System
            </a>
            <!-- أزرار التنقل -->
            <div class="nav-buttons">
                <a href="/"                class="btn btn-nav"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="/add_problem"     class="btn btn-nav"><i class="fas fa-plus-circle"></i> إضافة عطل</a>
                <a href="/view_problems"   class="btn btn-nav"><i class="fas fa-search"></i> عرض الأعطال</a>
                <a href="/edit_database"   class="btn btn-nav"><i class="fas fa-database"></i> إدارة البيانات</a>
                <a href="/reports"         class="btn btn-nav"><i class="fas fa-chart-bar"></i> التقارير</a>            
            </div>
        </div>
    </nav>

    <!-- ====== المحتوى الرئيسي ====== -->
    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- ====== الفوتر ====== -->
    <footer class="footer">
        <div class="text-center py-2">
            <small>
                Fault Registration System &nbsp;|&nbsp; v2.0 &nbsp;|&nbsp;
                General Fault Management &nbsp;|&nbsp;
                Developed by: <strong>Ahmed Ragab</strong>
            </small>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- ملف JavaScript الخاص بنا -->
    <script src="{{ url_for('static', filename='Script.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
